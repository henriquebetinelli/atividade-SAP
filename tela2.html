 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SAP</title>
 </head>
 <body>
    <header>

    </header>
    <main class="tela_geral">
        <section class="area_principal">
            <section class="primera_section">
                <div class="mensagem_inicial">
                    <img class="foto_robo" src="assets/foto_robozinho.png" alt="Foto robozinho">
                    <div class="texto_inicial">
                        <h1>Olá, tudo bem?</h1>
                        <h1>Como posso <br>ajudar hoje?</h1>
                        <button class="botao_mensagem_inicial">Fale comigo!</button>
                    </div>
                </div>
                <div class="acoes_inicial">
                    <button class="botao_acao_inicial">QUERO COMPRAR MATERIAL</button>
                    <button class="botao_acao_inicial">QUERO COMPRAR SERVIÇO</button>
                    <button class="botao_acao_inicial">CONSULTAR FLUXO DE PROCESSOS</button>
                    <button class="botao_acao_inicial">STATUS DAS MINHAS REQUISIÇÕES</button>
                    <button class="botao_acao_inicial">NÃO SEI AO CERTO, ME AJUDE</button>
                </div>
            </section>
            <section class="segunda_section">
                <div class="texto_compras">
                    <h2>Baseado em suas últimas compras</h2>
                    <div class="texto_recomendacoes">
                        <p>Ver todas as recomendações</p>
                        <button class="botao_mais">&plus;</button>
                    </div>
                </div>
                <div class="area_de_produtos">
                    <div class="produto">
                        <img class="foto_produto" src="assets/shopping.webp" alt="papel sulfite">
                        <div class="descricao_produto">
                            <p>Papel Sulfite A4 <br>R$ 34,41</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                    <div class="produto">
                        <img class="foto_produto" src="assets/sap logo.png" alt="logo">
                        <div class="descricao_produto">
                            <p>Solicitar Serviço <br>R$ 113,45</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                    <div class="produto">
                        <img class="foto_produto" src="assets/grampeador.png" alt="grampeador">
                        <div class="descricao_produto">
                            <p>Grampeador <br>R$14,00</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                    <div class="produto">
                        <img class="foto_produto" src="assets/caneta.webp" alt="caneta azul">
                        <div class="descricao_produto">
                            <p>Caneta Bic Azul <br>R$1,00</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                    <div class="produto">
                        <img class="foto_produto" src="assets/lapis.jpg" alt="lapis preto">
                        <div class="descricao_produto">
                            <p>Lápis preto <br>R$0,60</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                    <div class="produto">
                        <img class="foto_produto" src="assets/caderno.webp" alt="caderno 100 folhas">
                        <div class="descricao_produto">
                            <p>Caderno 100 folhas <br>10,40</p>
                            <button class="botao_carrinho">&plus;</button>
                        </div>
                    </div>
                </div>
            </section>
        </section>
        <section class="area_secundaria">
            <section class="section">

            </section>
        </section>
    </main>
    <footer>
    
    </footer>
 </body>
 </html>
